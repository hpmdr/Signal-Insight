name: Release

on:
  push:
    tags:
      - 'v*'           # git tag v1.0.0 触发
  workflow_dispatch:    # 也可以手动触发
    inputs:
      version:
        description: 'Release 版本号 (如 v1.0.0)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: microsoft

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 写入签名密钥
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.jks
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "storeFile=app/release.jks" >> keystore.properties

      - name: 构建 Release APK
        run: ./gradlew assembleRelease

      - name: 重命名 APK
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp app/build/outputs/apk/release/app-release.apk \
             SignalInsight-v$VERSION.apk

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SignalInsight ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: SignalInsight-*.apk
          generate_release_notes: true

      - name: 发布到 Gitee Releases
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TAG=${{ github.ref_name }}
          REPO="debumao/SingnalInsight"
          NOTE="SignalInsight $TAG 发布"

          # 创建 Release
          curl -X POST "https://gitee.com/api/v5/repos/$REPO/releases" \
            -H "Content-Type: application/json" \
            -d '{
              "access_token": "${{ secrets.GITEE_TOKEN }}",
              "tag_name": "'"$TAG"'",
              "name": "SignalInsight '"$TAG"'",
              "body": "'"$NOTE"'",
              "prerelease": false
            }' > /dev/null 2>&1

          # 上传 APK
          RELEASE_ID=$(curl -s "https://gitee.com/api/v5/repos/$REPO/releases/tags/$TAG?access_token=${{ secrets.GITEE_TOKEN }}" | jq -r '.id')
          if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
            curl -X POST "https://gitee.com/api/v5/repos/$REPO/releases/$RELEASE_ID/release_files" \
              -H "Content-Type: multipart/form-data" \
              -F "access_token=${{ secrets.GITEE_TOKEN }}" \
              -F "file=@SignalInsight-v$VERSION.apk"
          fi
