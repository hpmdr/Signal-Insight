name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: microsoft

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 设置 gradlew 执行权限
        run: chmod +x gradlew

      # 从 GitHub Secrets 恢复签名密钥和配置
      # Gradle 构建时自动读取 keystore.properties → 签名 Release APK
      - name: 解码签名密钥
        env:
          KEYSTORE_BASE64: ${{ secrets.SIGNING_KEY }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release.jks

      - name: 写入签名配置
        run: |
          echo "storePassword=${{ secrets.KEY_STORE_PASSWORD }}" > keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "storeFile=release.jks" >> keystore.properties

      # 构建已签名的 Release APK（gradle 自动使用 keystore.properties 签名）
      - name: 构建并签名 Release APK
        run: ./gradlew assembleRelease

      # 重命名并创建 GitHub Release
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          name: SignalInsight ${{ github.ref_name }}
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
